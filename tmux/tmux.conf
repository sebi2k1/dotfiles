### --- TPM (Tmux Plugin Manager) Setup ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'

### --- Basic Settings ---
# Use Ctrl+Space as prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Mouse support
set -g mouse on

# Renumber windows
set -g renumber-windows on

# 256 color support
set -g default-terminal "screen-256color"

# Use vi-style key bindings in copy mode
setw -g mode-keys vi

### --- Dracula Theme ---
set -g @dracula-plugins "cpu-usage ram-usage custom:network-status.sh"
set -g @dracula-custom-plugin-colors "green dark_gray"
set -g @dracula-show-powerline true
set -g @dracula-refresh-rate 5

# Initialize TPM (keep this at the bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

